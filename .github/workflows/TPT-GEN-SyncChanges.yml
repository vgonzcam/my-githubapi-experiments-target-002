name: Sync from Template
on:
  repository_dispatch:
    types: [template-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Template Sync Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add template remote
        run: |
          git remote add template https://${{ secrets.TEMPLATE_SYNC_TOKEN }}@github.com/${{ github.repository_owner }}/my-template-repository-001.git
          git fetch template main

      - name: Validate destination branch exists
        run: |
          if ! git ls-remote --heads origin main | grep -q main; then
            echo "❌ Destination branch main does not exist in origin. Please create it before running the sync."
            exit 1
          fi

      - name: Create sync branch
        run: |
          BRANCH_NAME="template-sync-$(date +%Y%m%d-%H%M%S)-main"
          echo "SYNC_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          git fetch origin
          git checkout -b $BRANCH_NAME origin/main

      - name: Sync files from template
        run: |
          # Read sync paths from .template-sync-paths
          SYNC_PATHS=()
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            SYNC_PATHS+=("$line")
          done < .template-sync-paths

          # Read exclusions from .template-sync-exclusions
          EXCLUDE_FILES=()
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            EXCLUDE_FILES+=("$line")
          done < .template-sync-exclusions

          # Helper to check if a file or path is in the exclusion list (relative to root)
          is_excluded() {
            local file="$1"
            for excl in "${EXCLUDE_FILES[@]}"; do
              # If exclusion ends with '/', treat as path prefix
              if [[ "$excl" == */ ]]; then
                [[ "$file" == "$excl"* ]] && return 0
              else
                [[ "$file" == "$excl" ]] && return 0
              fi
            done
            return 1
          }

          echo "📁 Starting sync process..."

          # If . is in SYNC_PATHS, treat as root: sync all files/folders except exclusions
          if printf '%s\n' "${SYNC_PATHS[@]}" | grep -qx '\.'; then
            echo "🔄 Syncing all files/folders from template root (except exclusions)..."
            git ls-tree template/main --name-only -r | while read file; do
              # Exclude files or paths in exclusion list
              if is_excluded "$file"; then
                echo " Excluding $file 🚫"
                continue
              fi
              # Only sync if file exists in template
              if git cat-file -e "template/main:$file" 2>/dev/null; then
                echo " Syncing file: $file 📄"
                mkdir -p "$(dirname "$file")"
                git show "template/main:$file" > "$file" 2>/dev/null || echo "    ⚠️  Could not sync $file"
                git add "$file" 2>/dev/null || echo "    ⚠️  Could not stage $file"
              fi
            done
            echo "✅ Successfully processed all files from root"
          else
            # Otherwise, process each path in SYNC_PATHS
            for path in "${SYNC_PATHS[@]}"; do
              echo "🔄 Processing $path..."

              # Check if path exists in template
              if git ls-tree template/main --name-only -r | grep -q "^$path" || git ls-tree template/main --name-only | grep -q "^$path"; then
                echo "✅ Found $path in template, syncing..."

                if [[ "$path" == *"/" ]]; then
                  # Directory: get all files in this directory from template
                  git ls-tree template/main --name-only -r | grep "^$path" | while read file; do
                    # Exclude files or paths in exclusion list
                    if is_excluded "$file"; then
                      echo " Excluding $file 🚫"
                      continue
                    fi

                    # Only sync if file exists in template
                    if git cat-file -e "template/main:$file" 2>/dev/null; then
                      echo " Syncing file: $file 📄"
                      mkdir -p "$(dirname "$file")"
                      git show "template/main:$file" > "$file" 2>/dev/null || echo "    ⚠️  Could not sync $file"
                      git add "$file" 2>/dev/null || echo "    ⚠️  Could not stage $file"
                    fi
                  done
                else
                  # Single file
                  if is_excluded "$path"; then
                    echo "🚫 Excluding $path"
                    continue
                  fi

                  # Only sync if file exists in template
                  if git cat-file -e "template/main:$path" 2>/dev/null; then
                    echo "📄 Creating/updating file: $path"
                    mkdir -p "$(dirname "$path")"
                    git show "template/main:$path" > "$path" 2>/dev/null || {
                      echo "⚠️  Could not get file $path from template"
                      continue
                    }
                    git add "$path" 2>/dev/null || echo "⚠️  Could not stage $path"
                  fi
                fi

                echo "✅ Successfully processed $path"

              else
                echo "⚠️  $path not found in template, creating placeholder..."

                if [[ "$path" == *"/" ]]; then
                  mkdir -p "$path"
                  echo "# Placeholder file - will be synced from template when available" > "${path}placeholder.md"
                  git add "${path}placeholder.md"
                  echo "📂 Created placeholder directory: $path"
                else
                  mkdir -p "$(dirname "$path")"
                  echo "# This file will be synced from template when available" > "$path"
                  git add "$path"
                  echo "📄 Created placeholder file: $path"
                fi
              fi
            done
          fi

          echo "🎉 Sync process completed"

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected, will create PR"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes to sync"
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          COMMIT_MSG="🔄 Sync from template"
          if [ -n "${{ github.event.client_payload.commit_message }}" ]; then
            COMMIT_MSG="🔄 Template sync: ${{ github.event.client_payload.commit_message }}"
          fi

          git commit -m "$COMMIT_MSG" -m "
          Template SHA: ${{ github.event.client_payload.template_sha }}
          Sync timestamp: $(date -u)

          This PR was automatically generated by the template sync workflow.
          "

      - name: Push sync branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin $SYNC_BRANCH

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        run: |
          # Get list of changed files for PR description
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          # Create comprehensive PR body
          PR_BODY=$(cat << 'EOF'
          ## 🔄 Automatic Template Synchronization

          This PR contains updates from the template repository and has been automatically generated.

          ### 📊 Sync Details
          **Template Repository:** \`${{ github.event.client_payload.template_repo }}\`
          **Template SHA:** \`${{ github.event.client_payload.template_sha }}\`
          **Trigger Commit:** ${{ github.event.client_payload.commit_message }}

          ### 📁 Files Updated
          See at files tab on the PR

          ### 🎯 What might be included
          - ✅ Shared configuration and utilities for IAC
          - ✅ Documentation updates
          - ✅ Common guidelines and standards
          - ✅ Template workflows and scripts

          ### 🔒 What's Protected
          - ❌ Local configuration files
          - ❌ Environment-specific files

          ### ✅ Review Checklist
          - [ ] Check that shared files align with service requirements
          - [ ] Verify no conflicts with service-specific configurations
          - [ ] Ensure tests still pass after merge
          - [ ] Review any new dependencies or changes

          ### 🚀 Ready to Merge
          This synchronization only updates shared template files and is safe to merge. Your service-specific code remains untouched.

          ---
          🤖 *Automatically generated by Template Sync Bot*
          EOF
          )

          # Create the pull request
          PR_URL=$(gh pr create \
            --title "🔄 Template Sync at $(date '+%Y-%m-%d %H:%M') [main]" \
            --body "$PR_BODY" \
            --head $SYNC_BRANCH \
            --base main \
            --assignee "@me" 2>/dev/null || \
          gh pr create \
            --title "🔄 Template Sync - $(date '+%Y-%m-%d %H:%M') [main]" \
            --body "$PR_BODY" \
            --head $SYNC_BRANCH \
            --base main)

          if [ -n "$PR_URL" ]; then
            echo "✅ Pull request created successfully: $PR_URL"
            
            # Add comment with additional context if triggered by specific event
            if [ -n "${{ github.event.client_payload.commit_message }}" ]; then
              gh pr comment "$PR_URL" --body "🔄 **Template Change Details**
              
              This sync was triggered by the following commit in the template repository:
              
              > ${{ github.event.client_payload.commit_message }}
              
              Template SHA: \`${{ github.event.client_payload.template_sha }}\`"
            fi
            
            echo "📝 PR Details:"
            echo "   - Title: 🔄 Template Sync - $(date '+%Y-%m-%d %H:%M')"
            echo "   - Branch: $SYNC_BRANCH"
            echo "   - Files changed: $(echo "$CHANGED_FILES" | wc -l)"
            echo "   - URL: $PR_URL"
          else
            echo "❌ Failed to create pull request"
            echo "Branch $SYNC_BRANCH has been pushed and is ready for manual PR creation"
            exit 1
          fi

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "🎉 Template sync completed - PR created for review"
          else
            echo "✅ Template sync completed - no changes needed"
          fi
